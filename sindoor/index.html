    <style>
        :root {
            --deep: #0D0A08;
            --wb: #141009;
            --crimson: #8B1A1A;
            --gold: #C9943A;
            --gl: #E8C068;
            --cream: #F5EDD8;
            --muted: #9A8A70;
            --white: #FFFFFF;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--deep);
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Header & Nav --- */
        .top-announcement {
            background: var(--crimson);
            color: var(--white);
            text-align: center;
            padding: 10px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(13, 10, 8, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(201, 148, 58, 0.1);
            transition: var(--transition);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 100px;
            /* Adjusted for banner1.jpg proportions */
            width: auto;
            transition: var(--transition);
        }

        .logo-img:hover {
            filter: brightness(1.2);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: var(--cream);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-cta {
            background: var(--crimson);
            color: var(--white) !important;
            padding: 12px 28px;
            border-radius: 2px;
            transition: var(--transition);
        }

        .nav-cta:hover {
            background: var(--gold);
            color: var(--deep) !important;
        }

        /* --- Hero Slider --- */
        .hero {
            position: relative;
            height: 90vh;
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        .slide-container {
            height: 100%;
            width: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
            z-index: 1;
        }

        .slide-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.65);
            transform: scale(1.1);
            transition: transform 8s ease-out;
        }

        .slide.active .slide-img {
            transform: scale(1);
        }

        .slide-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 900px;
            padding: 0 40px;
            transform: translateY(30px);
            opacity: 0;
            transition: all 1s ease-out 0.5s;
        }

        .slide.active .slide-content {
            transform: translateY(0);
            opacity: 1;
        }

        .hero-eyebrow {
            font-size: 12px;
            letter-spacing: 6px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(48px, 7vw, 100px);
            font-weight: 300;
            line-height: 1;
            margin-bottom: 30px;
            color: var(--white);
        }

        .hero-title em {
            color: var(--gl);
            font-style: italic;
        }

        .hero-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn-primary {
            background: var(--crimson);
            color: var(--white);
            padding: 18px 45px;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid var(--crimson);
        }

        .btn-primary:hover {
            background: transparent;
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            padding: 18px 45px;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: var(--transition);
        }

        .btn-secondary:hover {
            border-color: var(--white);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Slider Nav */
        .slider-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 15px;
        }

        .dot {
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: var(--transition);
        }

        .dot.active {
            background: var(--gold);
            width: 60px;
        }

        /* --- Marquee --- */
        .marquee {
            background: var(--wb);
            padding: 15px 0;
            border-bottom: 1px solid rgba(201, 148, 58, 0.1);
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee-content {
            display: inline-block;
            animation: scroll 30s linear infinite;
        }

        .marquee-content span {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted);
            margin-right: 50px;
        }

        .marquee-content span::after {
            content: "✦";
            margin-left: 50px;
            color: var(--crimson);
        }

        @keyframes scroll {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* --- About Section --- */
        .section-padding {
            padding: 120px 60px;
        }

        .about {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .about-image {
            position: relative;
            height: 600px;
            overflow: hidden;
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.5s var(--transition);
        }

        .about-image:hover img {
            transform: scale(1.05);
        }

        .about-image::before {
            content: "";
            position: absolute;
            inset: 20px;
            border: 1px solid var(--gold);
            z-index: 1;
            pointer-events: none;
        }

        .label {
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--gold);
            text-transform: uppercase;
            display: block;
            margin-bottom: 25px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 54px;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        .section-title em {
            color: var(--crimson);
            font-style: italic;
        }

        .about-text {
            color: var(--muted);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            border-top: 1px solid rgba(201, 148, 58, 0.2);
            padding-top: 40px;
        }

        .stat-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--gold);
        }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* --- Collections --- */
        .collections {
            background: var(--wb);
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .grid-8 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .collection-item {
            position: relative;
            height: 450px;
            overflow: hidden;
            cursor: pointer;
        }

        .collection-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s var(--transition);
        }

        .collection-item:hover img {
            transform: scale(1.1);
        }

        .collection-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            opacity: 0.9;
            transition: var(--transition);
        }

        .collection-item:hover .collection-overlay {
            background: linear-gradient(to top, var(--crimson) 0%, transparent 80%);
            opacity: 1;
        }

        .collection-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: var(--white);
            margin-bottom: 10px;
        }

        .view-collection {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .collection-item:hover .view-collection {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Services --- */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .service-card {

            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            text-align: center;
        }

        .service-card:hover {
            border-color: var(--gold);
            background: rgba(201, 148, 58, 0.03);
            transform: translateY(-10px);
        }

        .service-icon {
            font-size: 30px;
            color: var(--gold);
            margin-bottom: 25px;
            display: block;
        }

        .service-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .service-card p {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.8;
        }

        /* --- CTA Section --- */

            background: linear-gradient(rgba(139, 26, 26, 0.9), rgba(139, 26, 26, 0.9)), url('images/Slideshow1.jpg"top-announcement">✦ CELEBRATING OVER 35 YEARS OF EXCELLENCE ✦</div>

    <script>
        // Hero Slider Logic
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let currentSlide = 0;
        const slideInterval = 6000;

        function showSlide(n) {
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = (n + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        let slideTimer = setInterval(nextSlide, slideInterval);

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                clearInterval(slideTimer);
                showSlide(index);
                slideTimer = setInterval(nextSlide, slideInterval);
            });
        });

        // Header Scroll Effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 50) {
                header.style.padding = '10px 0';
                header.style.backgroundColor = 'rgba(13, 10, 8, 0.98)';
            } else {
                header.style.padding = '20px 0';
                header.style.backgroundColor = 'rgba(13, 10, 8, 0.95)';
            }
        });

        // Simple AOS (Animate on Scroll)
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('[data-aos]').forEach(el => observer.observe(el));
    </script>
